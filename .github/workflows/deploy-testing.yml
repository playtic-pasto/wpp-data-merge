name: Test GitHub Release Creation
on:
  workflow_dispatch:
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --- Paso 1: Checkout del repo completo (necesario para tags y deploy) ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Paso 2: Setup PHP para Composer ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      # --- Paso 3: Instalar dependencias de Composer ---
      - name: Install Composer dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          echo "✅ Composer dependencies installed"

      # --- Paso 4: Leer versión desde el archivo principal del plugin ---
      - name: Get plugin version
        id: get_version
        run: |
          plugin_file="wpp-data-merge.php"
          version_line=$(grep -i "Version:" "$plugin_file" | head -1)
          version=$(echo "$version_line" | sed -E 's/.*Version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Detected plugin version: $version"

      # --- Paso 5: Obtener la última tag del repositorio ---
      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT
          echo "Latest git tag: $latest_tag"

      # --- Paso 6: Comparar versiones ---
      - name: Compare versions
        id: compare
        run: |
          current="v${{ steps.get_version.outputs.version }}"
          latest="${{ steps.get_latest_tag.outputs.latest_tag }}"
          echo "Current: $current"
          echo "Latest:  $latest"

          if [ "$current" = "$latest" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # --- Paso 7: Crear o reutilizar la tag existente ---
      - name: Handle tag creation
        id: handle_tag
        run: |
          current="v${{ steps.get_version.outputs.version }}"
          latest="${{ steps.get_latest_tag.outputs.latest_tag }}"

          if [ "$current" = "$latest" ]; then
            echo "Tag $current already exists. Will reuse it."
            echo "tag_to_deploy=$latest" >> $GITHUB_OUTPUT
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "Creating new tag: $current"
            git tag "$current"
            git push origin "$current"
            echo "tag_to_deploy=$current" >> $GITHUB_OUTPUT
            echo "new_release=true" >> $GITHUB_OUTPUT
          fi

      # --- Paso 8: Crear ZIP optimizado para producción ---
      - name: Create production ZIP
        id: create_zip
        run: |
          plugin_name="wpp-data-merge"
          version="${{ steps.get_version.outputs.version }}"
          zip_name="${plugin_name}-${version}.zip"
          
          echo "📦 Creating production ZIP: $zip_name"
          
          # Crear directorio temporal
          mkdir -p /tmp/build
          
          # Copiar archivos necesarios excluyendo archivos de desarrollo
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='logs/' \
            --exclude='*.log' \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            ./ /tmp/build/$plugin_name/
          
          # Crear ZIP
          cd /tmp/build
          zip -r "$zip_name" "$plugin_name/"
          mv "$zip_name" $GITHUB_WORKSPACE/
          
          echo "zip_name=$zip_name" >> $GITHUB_OUTPUT
          echo "zip_path=$GITHUB_WORKSPACE/$zip_name" >> $GITHUB_OUTPUT
          echo "✅ ZIP created: $zip_name"

      # --- Paso 9: Crear release solo si es nuevo ---
      - name: Create GitHub Release
        if: steps.handle_tag.outputs.new_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.handle_tag.outputs.tag_to_deploy }}
          name: WPDM ${{ steps.handle_tag.outputs.tag_to_deploy }}
          generate_release_notes: true
          files: ${{ steps.create_zip.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Paso 10: Verificación final ---
      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📌 Tag: ${{ steps.handle_tag.outputs.tag_to_deploy }}"
          echo "📦 ZIP: ${{ steps.create_zip.outputs.zip_name }}"
          echo "🆕 New release: ${{ steps.handle_tag.outputs.new_release }}"
