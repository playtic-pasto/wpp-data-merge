name: Create GitHub Release on Main Branch
on:
  push:
    branches:
      - main
    paths:
      - "wpp-data-merge.php"
      
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --- Paso 1: Checkout del repo completo (necesario para tags y deploy) ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Paso 2: Setup PHP para Composer ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      # --- Paso 3: Instalar dependencias y generar autoloader ---
      - name: Install Composer dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          composer dump-autoload --optimize --no-dev
          echo "✅ Composer dependencies installed"
          echo "📋 Verifying vendor directory..."
          ls -lah vendor/ || echo "⚠️ vendor/ not found"
          ls -lah vendor/composer/ || echo "⚠️ vendor/composer/ not found"
          echo "🔍 Checking PSR-4 autoload mapping..."
          cat vendor/composer/autoload_psr4.php | grep -A2 "WPDM" || echo "⚠️ WPDM namespace not found in autoloader!"

      # --- Paso 4: Leer versión desde el archivo principal del plugin ---
      - name: Get plugin version
        id: get_version
        run: |
          plugin_file="wpp-data-merge.php"
          version_line=$(grep -i "Version:" "$plugin_file" | head -1)
          version=$(echo "$version_line" | sed -E 's/.*Version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Detected plugin version: $version"

      # --- Paso 5: Obtener la última tag del repositorio ---
      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT
          echo "Latest git tag: $latest_tag"

      # --- Paso 6: Comparar versiones ---
      - name: Compare versions
        id: compare
        run: |
          current="v${{ steps.get_version.outputs.version }}"
          latest="${{ steps.get_latest_tag.outputs.latest_tag }}"
          echo "Current: $current"
          echo "Latest:  $latest"

          if [ "$current" = "$latest" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # --- Paso 7: Crear o reutilizar la tag existente ---
      - name: Handle tag creation
        id: handle_tag
        run: |
          current="v${{ steps.get_version.outputs.version }}"
          latest="${{ steps.get_latest_tag.outputs.latest_tag }}"

          if [ "$current" = "$latest" ]; then
            echo "Tag $current already exists. Will reuse it."
            echo "tag_to_deploy=$latest" >> $GITHUB_OUTPUT
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "Creating new tag: $current"
            git tag "$current"
            git push origin "$current"
            echo "tag_to_deploy=$current" >> $GITHUB_OUTPUT
            echo "new_release=true" >> $GITHUB_OUTPUT
          fi

      # --- Paso 8: Crear ZIP optimizado para producción ---
      - name: Create production ZIP
        id: create_zip
        run: |
          plugin_name="wpp-data-merge"
          version="${{ steps.get_version.outputs.version }}"
          zip_name="${plugin_name}-${version}.zip"
          
          echo "📦 Creating production ZIP: $zip_name"
          
          # Crear directorio temporal
          mkdir -p /tmp/build
          
          # Copiar archivos necesarios excluyendo archivos de desarrollo
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='logs/' \
            --exclude='*.log' \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            ./ /tmp/build/$plugin_name/
          
          # Verificar que vendor/ existe
          echo "🔍 Verifying vendor directory in build..."
          ls -lah /tmp/build/$plugin_name/vendor/ || echo "⚠️ WARNING: vendor/ not found in build!"
          ls -lah /tmp/build/$plugin_name/vendor/composer/ || echo "⚠️ WARNING: vendor/composer/ not found in build!"
          
          # Crear ZIP
          cd /tmp/build
          zip -r "$zip_name" "$plugin_name/"
          mv "$zip_name" $GITHUB_WORKSPACE/
          
          # Verificar contenido del ZIP
          echo "🔍 Verifying ZIP contents..."
          unzip -l "$GITHUB_WORKSPACE/$zip_name" | grep "vendor/autoload.php" || echo "⚠️ WARNING: vendor/autoload.php not found in ZIP!"
          
          echo "zip_name=$zip_name" >> $GITHUB_OUTPUT
          echo "zip_path=$GITHUB_WORKSPACE/$zip_name" >> $GITHUB_OUTPUT
          echo "✅ ZIP created: $zip_name"

      # --- Paso 9: Crear release solo si es nuevo ---
      - name: Create GitHub Release
        if: steps.handle_tag.outputs.new_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.handle_tag.outputs.tag_to_deploy }}
          name: WPDM ${{ steps.handle_tag.outputs.tag_to_deploy }}
          generate_release_notes: true
          files: ${{ steps.create_zip.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # --- Paso 10: Setup SSH ---
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      # --- Paso 11: Crear el directorio remoto si no existe ---
      - name: Create remote directory if not exists
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "mkdir -p ${{ vars.HOSTINGER_PATH_MAIN }}"

      # --- Paso 12: Desplegar al servidor ---
      - name: Deploy to Hostinger Production
        run: |
          rsync -avz --delete \
            --chown=${{ secrets.HOSTINGER_USER_GROUP_PERMISSION }} \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            --exclude ".git/" \
            --exclude ".github/" \
            ./ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ vars.HOSTINGER_PATH_MAIN }}/

      # --- Paso 13: Verificación final ---
      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📌 Tag: ${{ steps.handle_tag.outputs.tag_to_deploy }}"
          echo "📦 ZIP: ${{ steps.create_zip.outputs.zip_name }}"
          echo "🆕 New release: ${{ steps.handle_tag.outputs.new_release }}"